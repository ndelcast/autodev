prodplanner:
  base_url: "https://prodplanner.outlined.io/mcp"
  client_id: "${PRODPLANNER_CLIENT_ID}"
  client_secret: "${PRODPLANNER_CLIENT_SECRET}"

claude:
  model: "sonnet"
  max_turns: 30
  timeout: "10m"

polling:
  interval: "60s"

docker:
  network_mode: "host"
  max_concurrent: 3

workspace_base_path: "./workspaces"
web_port: 8080
db_path: "./autodev.db"
