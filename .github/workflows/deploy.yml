name: Deploy AutoDev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o autodev .

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/autodev
            git pull origin main
            export PATH=$PATH:/usr/local/go/bin
            CGO_ENABLED=0 go build -o autodev .
            systemctl restart autodev
            sleep 2
            systemctl is-active autodev

      - name: Build Docker images
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/autodev
            docker build -t autodev-base:latest images/base/
            docker build -t autodev-laravel:latest images/laravel/
            docker build -t autodev-node:latest images/node/
