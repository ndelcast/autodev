{{define "layout"}}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDev{{block "title" .}}{{end}}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['DM Sans', 'sans-serif'] },
          colors: {
            surface: { 0: '#09090b', 1: '#0f0f12', 2: '#18181b', 3: '#1e1e22', 4: '#27272a' },
            accent: { DEFAULT: '#6366f1', light: '#818cf8', dim: '#4f46e5' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #09090b; color: #e4e4e7; font-family: 'DM Sans', sans-serif; }
    .grid-bg {
      background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'JetBrains Mono', monospace; }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge-idle { background: rgba(113,113,122,0.15); color: #a1a1aa; }
    .badge-idle::before { background: #71717a; }
    .badge-queued { background: rgba(113,113,122,0.15); color: #a1a1aa; }
    .badge-queued::before { background: #71717a; }
    .badge-running { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .badge-running::before { background: #f59e0b; }
    .badge-completed { background: rgba(34,197,94,0.15); color: #86efac; }
    .badge-completed::before { background: #22c55e; }
    .badge-failed { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .badge-failed::before { background: #ef4444; }

    @keyframes gen-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .gen-pulse { animation: gen-pulse 2s ease-in-out infinite; }

    .row-hover:hover { background: rgba(99,102,241,0.04); }
    .btn-primary { background: #6366f1; color: white; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; text-decoration: none; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: transparent; color: #a1a1aa; padding: 6px 14px; border-radius: 8px; font-weight: 500; font-size: 12px; border: 1px solid #27272a; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-secondary:hover { border-color: #3f3f46; color: #e4e4e7; }
    .btn-retry { background: rgba(239,68,68,0.12); color: #f87171; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; font-family: 'JetBrains Mono', monospace; }
    .btn-retry:hover { background: rgba(239,68,68,0.2); }
  </style>
</head>
<body class="grid-bg min-h-screen">
  <!-- Nav -->
  <nav class="border-b border-surface-3 px-8 py-4 flex items-center gap-6">
    <a href="/" class="font-mono font-bold text-lg tracking-tight text-white">
      <span class="text-accent">&#9632;</span> AutoDev
    </a>
    <a href="/" class="text-sm text-zinc-500 hover:text-zinc-300 transition-colors">Projets</a>
  </nav>

  <main class="max-w-6xl mx-auto px-8 py-8">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
